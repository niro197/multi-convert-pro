<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileConvert Pro - Convertisseur de fichiers en ligne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="#" class="logo">FileConvert</a>
            <nav class="nav">
                <a href="#features">Caractéristiques</a>
                <a href="#pricing">Tarification</a>
                <a href="#faq">FAQ</a>
            </nav>
            <div class="header-right">
                <button class="btn-login" id="btnHeaderLogin" onclick="showSection('auth')">Connexion</button>
                <button class="btn-primary" onclick="showSection('auth')">Essai gratuit</button>
            </div>
        </div>
    </header>

    <section id="auth" class="section active">
        <div class="auth-container">
            <div class="auth-card">
                <div id="loginForm">
                    <h2>Bienvenue</h2>
                    <p class="subtitle">Convertissez vos fichiers en quelques secondes</p>
                    <div class="form-group">
                        <label>Adresse email</label>
                        <input type="email" id="loginEmail" placeholder="vous@example.com">
                    </div>
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" id="loginPassword" placeholder="••••••••">
                    </div>
                    <button class="btn-primary" onclick="handleLogin()" style="width: 100%; margin-top: 0.5rem;">Se connecter</button>
                    <div class="toggle-auth">Pas de compte ? <button onclick="toggleAuth()">Créer un compte</button></div>
                </div>
            </div>
        </div>
    </section>

    <section id="dashboard" class="section">
        <div class="container">
            <div id="pricing" class="pricing-section">
                <h2 class="pricing-title">Tarification simple</h2>
                <div class="pricing-grid">
                    <div class="pricing-card">
                        <h3>Starter</h3>
                        <div class="price">$0</div>
                        <button class="btn-primary" disabled style="width: 100%; opacity: 0.5;">Plan actuel</button>
                    </div>
                    <div class="pricing-card featured">
                        <div class="pricing-badge">POPULAIRE</div>
                        <h3>Premium</h3>
                        <div class="price">$0.99</div>
                        <p class="price-period">par mois</p>
                        <form method="post" action="https://www.paypal.com/cgi-bin/webscr" style="width: 100%;">
                            <input type="hidden" name="cmd" value="_xclick">
                            <input type="hidden" name="business" value="votre-email@paypal.com">
                            <input type="hidden" name="item_name" value="FileConvert Pro - Premium Monthly">
                            <input type="hidden" name="amount" value="0.99">
                            <input type="hidden" name="currency_code" value="USD">
                            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 0.8rem;">S'abonner maintenant</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
