<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileConvert Pro | Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-file-pdf"></i> File<span>Convert</span></div>
            <div class="nav-menu">
                <a href="#pricing">Prix</a>
                <button class="btn-primary-gradient">Essai Gratuit</button>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-content">
            <h1>Convertissez sans limite.</h1>
            <div class="drop-card" id="dropZone">
                <i class="fas fa-cloud-upload-alt drop-icon"></i>
                <h3>Glissez vos fichiers ici</h3>
                <input type="file" id="fileInput" hidden>
                <button class="btn-select" onclick="document.getElementById('fileInput').click()">Parcourir</button>
                
                <div id="uploadStatus" class="hidden">
                    <div class="loader-bar"><div class="progress"></div></div>
                    <p id="statusText">Traitement...</p>
                </div>
            </div>
        </div>
    </section>

    <section id="pricing" class="pricing-section">
        <div class="pricing-container">
            <div class="price-card featured">
                <div class="popular-tag">OFFRE SPÉCIALE</div>
                <h3>Plan Pro</h3>
                <div class="amount">$0.99<span>/mois</span></div>
                <ul class="features">
                    <li><i class="fas fa-check"></i> Illimité</li>
                    <li><i class="fas fa-check"></i> Haute vitesse</li>
                </ul>
                <form action="https://www.paypal.com/cgi-bin/webscr" method="post">
                    <input type="hidden" name="cmd" value="_xclick">
                    <input type="hidden" name="business" value="TON_EMAIL@GMAIL.COM">
                    <input type="hidden" name="item_name" value="FileConvert Pro">
                    <input type="hidden" name="amount" value="0.99">
                    <input type="hidden" name="currency_code" value="USD">
                    <button type="submit" class="btn-primary-gradient">S'abonner maintenant</button>
                </form>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
