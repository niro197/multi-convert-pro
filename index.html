<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiConvert Pro | Le Smallpdf Rapide</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Multi<span>Convert</span></div>
    </nav>

    <main class="main-content">
        <div class="header-section">
            <h1 id="main-title">Convertir en PDF</h1>
            <p>Le convertisseur de fichiers en ligne n°1 de niro197</p>
        </div>

        <!-- Zone de dépôt style Smallpdf -->
        <div class="converter-container" id="drop-zone">
            <div class="inner-dropzone">
                <div class="icon-illustration">📂</div>
                <button class="btn-choose" onclick="document.getElementById('fileInput').click()">Choisir les fichiers</button>
                <p class="drop-text">ou glissez-déposez les fichiers ici</p>
                <input type="file" id="fileInput" hidden>
            </div>
            
            <!-- Zone de chargement cachée -->
            <div id="processing-zone" class="hidden">
                <div class="loader"></div>
                <p id="file-name-display"></p>
                <button id="execute-btn" class="btn-action">Convertir maintenant</button>
            </div>
        </div>

        <!-- Menu des outils en bas -->
        <div class="tools-grid">
            <div class="tool-item active" onclick="setTool('txt-pdf', 'Texte en PDF', '#e74c3c')">
                <span class="tool-icon">📄</span> Texte vers PDF
            </div>
            <div class="tool-item" onclick="setTool('compress', 'Compresser PDF', '#f1c40f')">
                <span class="tool-icon">🗜️</span> Compresser ZIP
            </div>
            <div class="tool-item" onclick="setTool('png-jpg', 'Image en JPG', '#3498db')">
                <span class="tool-icon">🖼️</span> PNG vers JPG
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
