<!-- Remplace la section <section class="grid"> par celle-ci -->
<div class="grid">
    <div class="tool-card" onclick="openTool('img-pdf')">
        <div class="icon-box red">📄</div>
        <h3>Image vers PDF</h3>
        <p>Photos vers documents PDF.</p>
    </div>
    <div class="tool-card" onclick="openTool('png-jpg')">
        <div class="icon-box blue">🖼️</div>
        <h3>PNG vers JPG</h3>
        <p>Change le format de tes images.</p>
    </div>
    <div class="tool-card" onclick="openTool('txt-pdf')">
        <div class="icon-box green">📝</div>
        <h3>Texte vers PDF</h3>
        <p>Crée un PDF à partir d'un fichier texte.</p>
    </div>
    <div class="tool-card" onclick="openTool('compress')">
        <div class="icon-box purple">🗜️</div>
        <h3>Compression ZIP</h3>
        <p>Réduisez la taille des dossiers.</p>
    </div>
</div>
